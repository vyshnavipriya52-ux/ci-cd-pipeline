name: CI/CD Multi Environment

on:
  push:
    branches: ["main"]

jobs:

  build-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm install
    - run: npm test

  docker:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
    - run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:latest .
    - run: docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:latest

  deploy-staging:
    needs: docker
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Staging
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:latest
          docker stop staging-app || true
          docker rm staging-app || true
          docker run -d -p 3000:3000 --name staging-app ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:latest

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production   
    steps:
    - name: Deploy to Production
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:latest
          docker stop $(docker ps -q) || true
          docker rm $(docker ps -aq) || true
          docker run -d -p 3000:3000 --name staging-app ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:latest
